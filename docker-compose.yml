services:
  dashboard:
    build:
      context: .
    image: android-game-cv-autopilot:0.1.15c-beta
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8765}:8765"
    environment:
      DASHBOARD_HOST: "127.0.0.1"
      DASHBOARD_PORT: "8765"
      DASHBOARD_AUTH_ENABLED: "${DASHBOARD_AUTH_ENABLED:-1}"
      DASHBOARD_USERNAME: "${DASHBOARD_USERNAME:-admin}"
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-change-me}"
      DASHBOARD_MCP_API_KEY: "${DASHBOARD_MCP_API_KEY:-change-me}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      CV_MODELS: "${CV_MODELS:-xiaomi/mimo-v2.5}"
      CV_MODEL_ATTEMPTS: "${CV_MODEL_ATTEMPTS:-3}"
      CV_MAX_TOKENS: "${CV_MAX_TOKENS:-4096}"
      DEVICE_FARM: "${DEVICE_FARM:-local}"
      LOCAL_DEVICE: "${LOCAL_DEVICE:-auto}"
      ADB_SERVER_SOCKET: "${ADB_SERVER_SOCKET:-tcp:host.docker.internal:5037}"
      PURCHASE_MODE: "preview"
      GOOGLE_PHONE_MODE: "manual"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./dashboard/presets:/app/dashboard/presets
      - ./dashboard/profiles:/app/dashboard/profiles
      - ./dashboard/recordings:/app/dashboard/recordings
      - ./dashboard/prompts:/app/dashboard/prompts
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped
